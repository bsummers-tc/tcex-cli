repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: double-quote-string-fixer
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: pretty-format-json
        args:
          - --autofix
      - id: requirements-txt-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pycqa/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        exclude: |
          (?x)(
              ^tests/
          )
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
      - id: isort
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args:
          - --py311-plus
  - repo: https://github.com/google/osv-scanner/
    rev: v2.3.8
    hooks:
      - id: osv-scanner
        args:
          - --lockfile
          - uv.lock
  # ty, ruff, and ruff-format each run once over the whole project. The tools
  # discover and descend into the nested git submodules themselves (applying each
  # submodule's own pyproject.toml), so no separate per-submodule hooks are needed.
  # `types_or: [..., directory]` makes a hook fire on a changed submodule pointer
  # as well as on changed Python files; `pass_filenames: false` lets each tool
  # scan the tree using its own configuration. Tool versions come from uv.lock.
  - repo: local
    hooks:
      - id: ty
        entry: ty check
        language: system
        name: ty
        pass_filenames: false
        types_or:
          - python
          - directory
      - id: ruff
        entry: ruff check --fix
        language: system
        name: ruff
        pass_filenames: false
        types_or:
          - python
          - pyi
          - directory
      - id: ruff-format
        entry: ruff format
        language: system
        name: ruff-format
        pass_filenames: false
        types_or:
          - python
          - pyi
          - directory
